<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contactos</title>
    <h3>Autor: Diana Azumi Accostupa Alcca</h3>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="contenedor">

        <h1>Agenda de Contactos</h1>

        <!-- Formulario -->
        <div class="formulario">

            <h2>Registrar Contacto</h2>

            <input type="text" id="nombre" placeholder="Ingrese su nombre completo">

            <input type="text" id="telefono" placeholder="Ingrese su teléfono">

            <input type="email" id="correo" placeholder="Ingrese su correo">

            <button id="btnAgregar">Agregar Contacto</button>

            <p id="mensaje"></p>

        </div>
    </div>
    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
</body>

</html>
